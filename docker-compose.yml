version: "3.9"

services:
  boiler-agent-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: boiler-agent-core:local
    container_name: boiler-agent-core
    env_file:
      - .env
    environment:
      - PORT=8000
      - APP_ENV=development
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
